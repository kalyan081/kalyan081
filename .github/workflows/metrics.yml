name: Generate All Metrics Showcase
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Classic Overview Card
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.classic.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

      - name: Isometric Commit Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.isocalendar.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Languages Activity
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.languages.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8

      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.habits.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.achievements.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: c

      - name: Lines of Code Changed
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.lines.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: history

      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.activity.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

      - name: Starred Topics & Repos
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.topics.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: icons
          plugin_stars: yes
          plugin_stars_limit: 3

      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.notable.svg
          token: ${{ secrets.METRIC_TOKEN }}
          user: kalyan081
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_notable: yes
          plugin_notable_from: all
          plugin_followup: yes
          plugin_followup_sections: user
